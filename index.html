<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compras InvestHome</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Vista 1: Inicio de Sesión -->
    <div id="view-login" class="view active">
        <div class="login-container">
            <h1>Compras InvestHome</h1>
            <div class="form-group">
                <label for="select-persona">¿Quién pide la mercancía?</label>
                <select id="select-persona" class="form-select">
                    <option value="">Seleccione una opción</option>
                    <option value="Lucas | Técnico">Lucas | Técnico</option>
                    <option value="Juanjo | Técnico">Juanjo | Técnico</option>
                    <option value="Daniel | Técnico">Daniel | Técnico</option>
                    <option value="Miguel | Técnico">Miguel | Técnico</option>
                    <option value="Oleg | Técnico">Oleg | Técnico</option>
                    <option value="Romer | Técnico">Romer | Técnico</option>
                    <option value="Alejandro | Técnico">Alejandro | Técnico</option>
                    <option value="Javier | Técnico">Javier | Técnico</option>
                    <option value="Alexander | Encargado">Alexander | Encargado</option>
                    <option value="Oleksandr Moroz | Encargado">Oleksandr Moroz | Encargado</option>
                    <option value="Juan Pedro | Encargado">Juan Pedro | Encargado</option>
                    <option value="Florin | Encargado">Florin | Encargado</option>
                    <option value="Petru | Encargado">Petru | Encargado</option>
                    <option value="Ruslan | Encargado">Ruslan | Encargado</option>
                    <option value="Ionel | Encargado">Ionel | Encargado</option>
                    <option value="Stefan | Encargado">Stefan | Encargado</option>
                    <option value="Vladimir | Encargado">Vladimir | Encargado</option>
                    <option value="Yurii Kharin | Fontanería">Yurii Kharin | Fontanería</option>
                    <option value="Cristina | Project Manager">Cristina | Project Manager</option>
                    <option value="Otro">Otro</option>
                </select>
            </div>
            <div class="form-group">
                <label for="select-obra">¿Para qué obra es?</label>
                <select id="select-obra" class="form-select">
                    <option value="">Seleccione una opción</option>
                    <option value="01.7 Villas | Urb. Peña Blanquilla [Mijas]">01.7 Villas | Urb. Peña Blanquilla [Mijas]</option>
                    <option value="02. Caseta de Ventas El Higueron [Mijas]">02. Caseta de Ventas El Higueron [Mijas]</option>
                    <option value="03. Quinta de Sierra Blanca [Marbella]">03. Quinta de Sierra Blanca [Marbella]</option>
                    <option value="04. Gualdalmina 19 [Marbella]">04. Gualdalmina 19 [Marbella]</option>
                    <option value="05. C2 13 Camojan [Marbella]">05. C2 13 Camojan [Marbella]</option>
                    <option value="06. CC El Rodeo [Marbella]">06. CC El Rodeo [Marbella]</option>
                    <option value="07. Los Flamingos 101 [Benahavís]">07. Los Flamingos 101 [Benahavís]</option>
                    <option value="08. A2 19 La Zagaleta [Benahavís]">08. A2 19 La Zagaleta [Benahavís]</option>
                    <option value="09. C1 12 La Zagaleta [Benahavís]">09. C1 12 La Zagaleta [Benahavís]</option>
                    <option value="10. C1 14 La Zagaleta [Benahavís]">10. C1 14 La Zagaleta [Benahavís]</option>
                    <option value="11. Caserias del Esperonal | Marbella Country Club [Benahavís]">11. Caserias del Esperonal | Marbella Country Club [Benahavís]</option>
                    <option value="12. La Perla [Benahavís]">12. La Perla [Benahavís]</option>
                    <option value="13. La Verde Island | Doña Julia [Estepona]">13. La Verde Island | Doña Julia [Estepona]</option>
                    <option value="14. Arroyo Medio [Estepona]">14. Arroyo Medio [Estepona]</option>
                    <option value="15. El Taraje Fase 1 [Estepona]">15. El Taraje Fase 1 [Estepona]</option>
                    <option value="Oficina">Oficina</option>
                    <option value="0. Otra">0. Otra</option>
                </select>
            </div>
            <button id="btn-login" class="btn btn-primary">Aceptar</button>
        </div>
    </div>

    <!-- Vista 2: Principal (Tiendas) -->
    <div id="view-main" class="view">
        <header class="app-header">
            <button id="btn-menu" class="icon-btn" aria-label="Menú">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <h2>Tiendas</h2>
            <button id="btn-search" class="icon-btn" aria-label="Buscar">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
            </button>
        </header>

        <div class="search-container" id="search-container" style="display: none;">
            <input type="text" id="search-input" placeholder="Buscar productos..." class="search-input">
            <button id="btn-close-search" class="icon-btn">✕</button>
        </div>

        <main class="main-content">
            <div id="tiendas-list" class="tiendas-grid">
                <!-- Las tiendas se cargarán dinámicamente -->
            </div>
        </main>

        <div id="cart-button" class="cart-button">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="9" cy="21" r="1"></circle>
                <circle cx="20" cy="21" r="1"></circle>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>
            <span id="cart-count" class="cart-count">0</span>
        </div>

        <footer class="app-footer">
            <button class="footer-btn active" data-view="main">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span>Tiendas</span>
            </button>
            <button class="footer-btn" data-view="pedidos">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
                <span>Mis Pedidos</span>
            </button>
        </footer>
    </div>

    <!-- Vista 3: Categorías de Tienda -->
    <div id="view-categorias" class="view">
        <header class="app-header">
            <button class="icon-btn btn-back" aria-label="Volver">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>
            <h2 id="categorias-tienda-nombre"></h2>
            <div style="width: 24px;"></div>
        </header>

        <main class="main-content">
            <div id="categorias-list" class="categorias-grid">
                <!-- Las categorías se cargarán dinámicamente -->
            </div>
        </main>
    </div>

    <!-- Vista 4: Productos -->
    <div id="view-productos" class="view">
        <header class="app-header">
            <button class="icon-btn btn-back" aria-label="Volver">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>
            <h2 id="productos-categoria-nombre"></h2>
            <div style="width: 24px;"></div>
        </header>

        <main class="main-content">
            <div id="productos-list" class="productos-list">
                <!-- Los productos se cargarán dinámicamente -->
            </div>
        </main>
    </div>

    <!-- Vista 5: Carrito -->
    <div id="view-carrito" class="view">
        <header class="app-header">
            <button class="icon-btn btn-back" aria-label="Volver">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>
            <h2>Carrito</h2>
            <div style="width: 24px;"></div>
        </header>

        <main class="main-content">
            <div id="carrito-items" class="carrito-items">
                <!-- Los items del carrito se cargarán dinámicamente -->
            </div>
            <div id="carrito-empty" class="empty-state" style="display: none;">
                <p>El carrito está vacío</p>
            </div>
        </main>

        <footer class="carrito-footer">
            <button id="btn-finalizar-pedido" class="btn btn-primary btn-block" disabled>Finalizar Pedido</button>
        </footer>
    </div>

    <!-- Vista 6: Mis Pedidos -->
    <div id="view-pedidos" class="view">
        <header class="app-header">
            <button id="btn-menu-pedidos" class="icon-btn" aria-label="Menú">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <h2>Mis Pedidos</h2>
            <div style="width: 24px;"></div>
        </header>

        <main class="main-content">
            <div id="pedidos-list" class="pedidos-list">
                <!-- Los pedidos se cargarán dinámicamente -->
            </div>
            <div id="pedidos-empty" class="empty-state" style="display: none;">
                <p>No tienes pedidos realizados</p>
            </div>
        </main>

        <footer class="app-footer">
            <button class="footer-btn" data-view="main">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span>Tiendas</span>
            </button>
            <button class="footer-btn active" data-view="pedidos">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
                <span>Mis Pedidos</span>
            </button>
        </footer>
    </div>

    <!-- Vista 7: Gestión de Tienda (para administradores) -->
    <div id="view-gestion-tienda" class="view">
        <header class="app-header">
            <button class="icon-btn btn-back" aria-label="Volver">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>
            <h2 id="gestion-tienda-nombre"></h2>
            <div style="width: 24px;"></div>
        </header>

        <div class="tabs">
            <button class="tab-btn active" data-tab="en-curso">Pedidos en Curso</button>
            <button class="tab-btn" data-tab="cerrados">Pedidos Cerrados</button>
        </div>

        <main class="main-content">
            <div id="pedidos-en-curso" class="tab-content active">
                <div id="pedidos-en-curso-list" class="pedidos-gestion-list">
                    <!-- Los pedidos se cargarán dinámicamente -->
                </div>
                <div id="pedidos-en-curso-empty" class="empty-state" style="display: none;">
                    <p>No hay pedidos en curso</p>
                </div>
            </div>
            <div id="pedidos-cerrados" class="tab-content">
                <div id="pedidos-cerrados-list" class="pedidos-gestion-list">
                    <!-- Los pedidos cerrados se cargarán dinámicamente -->
                </div>
                <div id="pedidos-cerrados-empty" class="empty-state" style="display: none;">
                    <p>No hay pedidos cerrados</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Menú lateral -->
    <div id="sidebar" class="sidebar">
        <div class="sidebar-overlay"></div>
        <div class="sidebar-content">
            <div class="sidebar-header">
                <h3>Menú</h3>
                <button id="btn-close-sidebar" class="icon-btn">✕</button>
            </div>
            <div class="sidebar-body">
                <div class="sidebar-user-info">
                    <p><strong>Usuario:</strong> <span id="sidebar-usuario"></span></p>
                    <p><strong>Obra:</strong> <span id="sidebar-obra"></span></p>
                </div>
                <button id="btn-gestion-tienda" class="sidebar-btn">Gestión de Tienda</button>
                <button id="btn-logout" class="sidebar-btn btn-danger">Cerrar Sesión</button>
            </div>
        </div>
    </div>

    <!-- Database y App como módulos ES6 -->
    <script type="module" src="database.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
